name: Deploy Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "misty-wildflower-0076/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: misty-wildflower-0076

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: misty-wildflower-0076/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
