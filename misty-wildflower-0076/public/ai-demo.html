<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Worker Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: canvas;
        color: canvastext;
      }

      .card {
        width: min(680px, calc(100vw - 32px));
        border: 1px solid color-mix(in oklab, canvastext 20%, transparent);
        border-radius: 12px;
        padding: 16px;
        background: color-mix(in oklab, canvas 96%, canvastext 4%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }

      p {
        margin: 0 0 16px;
        opacity: 0.8;
      }

      form {
        display: grid;
        gap: 10px;
      }

      textarea {
        width: 100%;
        min-height: 96px;
        border-radius: 10px;
        border: 1px solid color-mix(in oklab, canvastext 24%, transparent);
        padding: 10px;
        background: canvas;
        color: canvastext;
        resize: vertical;
      }

      button {
        justify-self: start;
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        background: #2563eb;
        color: white;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      .label {
        margin-top: 14px;
        font-size: 0.875rem;
        opacity: 0.8;
      }

      pre {
        margin: 6px 0 0;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid color-mix(in oklab, canvastext 20%, transparent);
        background: color-mix(in oklab, canvas 90%, canvastext 10%);
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Cloudflare AI Worker Demo</h1>
      <p>Ask a simple question and this page will call your worker at <code>/api/ai</code>.</p>

      <form id="ask-form">
        <textarea id="question" name="question" required>What is one simple budgeting tip for this week?</textarea>
        <button id="ask-btn" type="submit">Ask AI</button>
      </form>

      <div class="label">Response</div>
      <pre id="answer">No response yet.</pre>
    </main>

    <script>
      const form = document.getElementById("ask-form");
      const questionInput = document.getElementById("question");
      const askButton = document.getElementById("ask-btn");
      const answer = document.getElementById("answer");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const prompt = questionInput.value.trim();
        if (!prompt) return;

        askButton.disabled = true;
        answer.textContent = "Thinking...";

        try {
          const response = await fetch("/api/ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data?.error || "AI request failed");
          }

          answer.textContent = data.text || "(No text returned)";
        } catch (error) {
          answer.textContent = `Error: ${error.message || "Unknown error"}`;
        } finally {
          askButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
